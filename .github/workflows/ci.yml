name: CI

on:
  push:
  pull_request:

defaults:
  run:
    shell: bash  # explicit bash enables pipefail — `cmd | tail` can't mask a red exit

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]  # hooks shell out to ps/tmux; BSD vs procps differs
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest
      - run: python -m pytest tests/ -q
